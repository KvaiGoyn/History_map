<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Интерактивная историческая карта Санкт-Петербурга с маршрутом по знаковым локациям. Откройте для себя факты о достопримечательностях.">
    <meta name="keywords" content="Санкт-Петербург, история, карта, достопримечательности, Яндекс.Карты, интерактивная карта">
    <meta name="author" content="Историческая карта Санкт-Петербурга">
    <meta property="og:title" content="Историческая карта Санкт-Петербурга">
    <meta property="og:description" content="Интерактивная карта с точками интереса и фактами о исторических местах Санкт-Петербурга.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://example.com">
    <meta property="og:image" content="https://example.com/images/screenshot_map.png">
    <title>Историческая карта Санкт-Петербурга</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <!-- Яндекс.Карты API (замените YOUR_API_KEY на ваш ключ с https://developer.tech.yandex.ru/) -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=8c0693ea-8279-4d14-a26e-c2089f8c9828&lang=ru_RU" type="text/javascript"></script>
    <!-- Если нет ключ ита, карта не загрузится. Для тестирования можно использовать демо-ключ (не гарантируется работа). -->
</head>
<body>
    <!-- Индикатор загрузки -->
    <div id="loader" class="loader" aria-live="polite" aria-busy="true">
        <div class="loader-spinner" aria-hidden="true"></div>
        <p>Загрузка карты...</p>
    </div>
    <div id="map" role="application" aria-label="Интерактивная карта Санкт-Петербурга с историческими локациями"></div>

    <!-- Модальное окно -->
    <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-details">
        <div class="modal-content">
            <button class="close" aria-label="Закрыть модальное окно">&times;</button>
            <img id="modal-image" src="" alt="Фото локации">
            <div id="modal-details" class="modal-details">
                <h2 id="modal-title"></h2>
                <div class="details-grid">
                    <div class="detail-item">
                        <strong>Дата строительства:</strong>
                        <span id="modal-construction-date"></span>
                    </div>
                    <div class="detail-item">
                        <strong>Архитектор:</strong>
                        <span id="modal-architect"></span>
                    </div>
                    <div class="detail-item">
                        <strong>Исторические данные:</strong>
                        <span id="modal-historical-data"></span>
                    </div>
                    <div class="detail-item">
                        <strong>Архитектурные особенности:</strong>
                        <span id="modal-architectural-features"></span>
                    </div>
                </div>
            </div>
            <div class="facts-carousel" role="region" aria-label="Карусель фактов">
                <!-- Контейнер Swiper -->
                <div class="swiper factsSwiper">
                    <div class="swiper-wrapper">
                        <!-- Слайды будут вставлены динамически -->
                    </div>
                    <!-- Пагинация (точки) -->
                    <div class="swiper-pagination"></div>
                    <!-- Навигационные кнопки (опционально) -->
                    <div class="swiper-button-next"></div>
                    <div class="swiper-button-prev"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
